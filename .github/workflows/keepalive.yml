name: Keep Render awake

# Render 免費方案在閒置 15 分鐘後會讓服務休眠，下次造訪需等 30~60 秒冷啟動。
# 每 10 分鐘打一次健康檢查端點，服務就不會休眠，訪客點連結進來即為秒開。
on:
  schedule:
    - cron: '*/10 * * * *'   # 每 10 分鐘
  workflow_dispatch:          # 也可在 GitHub 上手動觸發

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 90 \
              https://project-staffing-system.onrender.com/api/health) || true
            echo "第 $i 次：HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 20
          done
          echo "健康檢查未通過"
          exit 1
